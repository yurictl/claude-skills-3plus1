# Golden case: container without resources (BLOCKER "Resources declared").
apiVersion: apps/v1
kind: Deployment
metadata:
  name: worker
  labels:
    app: worker
spec:
  replicas: 2
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app: worker
  template:
    metadata:
      labels:
        app: worker
    spec:
      containers:
        - name: worker
          image: busybox:1.36.1
          command: ["sh", "-c", "while true; do process-queue; sleep 5; done"]
          readinessProbe:
            exec:
              command: ["sh", "-c", "test -f /tmp/ready"]
          securityContext:
            runAsNonRoot: true
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
